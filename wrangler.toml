name = "ec-module"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "ec_db"
database_id = "REPLACE_WITH_REAL_DATABASE_ID"
migrations_dir = "migrations"

[vars]
APP_BASE_URL = "http://localhost:8788"
STRIPE_SUCCESS_URL = "http://localhost:8788/checkout/success"
STRIPE_CANCEL_URL = "http://localhost:8788/checkout/cancel"
ENVIRONMENT = "development"
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "admin1234"
EMAIL_FROM = "store@example.com"
PAYMENT_METHODS = "stripe,bank_transfer"
BANK_TRANSFER_INFO = "サンプル銀行 本店 普通 1234567 カ)サンプルストア"
# ---- 小規模EC想定の上限(課金防波堤・仮の値。必要になったら引き上げる) ----
# 画像ストレージの上限(MB)。超過するとアップロードを拒否(500KB画像×約2,000枚相当。R2無料枠10GBの1/10)
R2_STORAGE_LIMIT_MB = "1024"
# 商品数の上限。超過すると商品登録を拒否
MAX_PRODUCTS = "100"
# ---- 送料設定(全国一律。デフォルトは送料込み運用で従来表示を維持) ----
# 全国一律送料(円)。0の場合は送料込み運用(価格表示・合計に送料行を出さない)
SHIPPING_FEE = "0"
# この金額(円)以上の購入で送料無料にする閾値。0の場合は無料条件なし
FREE_SHIPPING_THRESHOLD = "0"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "ec-images"
