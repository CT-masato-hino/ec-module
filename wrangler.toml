name = "ec-module"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "ec_db"
database_id = "REPLACE_WITH_REAL_DATABASE_ID"
migrations_dir = "migrations"

[vars]
APP_BASE_URL = "http://localhost:8788"
STRIPE_SUCCESS_URL = "http://localhost:8788/checkout/success"
STRIPE_CANCEL_URL = "http://localhost:8788/checkout/cancel"
ENVIRONMENT = "development"
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = "admin1234"
EMAIL_FROM = "store@example.com"
PAYMENT_METHODS = "stripe,bank_transfer"
BANK_TRANSFER_INFO = "サンプル銀行 本店 普通 1234567 カ)サンプルストア"
# 画像ストレージの上限(MB)。超過するとアップロードを拒否する(R2無料枠10GBの手前で止める課金防波堤)
R2_STORAGE_LIMIT_MB = "8192"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "ec-images"
