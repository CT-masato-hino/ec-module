<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>商品 | 管理画面</title>
<link rel="stylesheet" href="/admin.css">
</head>
<body class="admin-body">
<aside class="admin-sidebar">
  <div class="admin-sidebar__brand">SAMPLE STORE<span>管理画面</span></div>
  <nav class="admin-sidebar__nav">
    <a href="/admin"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg>ホーム</a>
    <a href="/admin/products" class="is-active"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>商品</a>
    <a href="/admin/orders"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>注文</a>
  </nav>
  <div class="admin-sidebar__footer">
    <a href="#"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>設定</a>
    <a href="#"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>ヘルプ</a>
  </div>
</aside>
<div class="admin-content">
  <div class="admin-content__header">
    <h1>商品</h1>
    <button type="button" id="toggle-create-form" class="admin-button-primary">
      <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      商品を登録
    </button>
  </div>

  <div class="admin-card admin-form-section" id="create-form-section">
    <h2 id="form-title">商品を登録</h2>
    <form class="admin-form-grid" id="create-form">
      <label>商品名<input type="text" name="name" required></label>
      <label>スラッグ(URL用・編集時は変更不可)<input type="text" name="slug" required placeholder="sample-product"></label>
      <label>商品画像URL<input type="text" name="image_url" placeholder="/images/placeholder-1.svg"></label>
      <label>商品説明<textarea name="description" rows="3"></textarea></label>
      <label>価格(税込)<input type="number" name="price_display" required></label>
      <label>通貨<input type="text" name="currency" value="JPY"></label>
      <label>表示順<input type="number" name="sort_order" value="0"></label>
      <label>在庫数(空欄=在庫管理しない)<input type="number" name="stock" min="0" placeholder="例: 20"></label>
      <label>公開状態
        <select name="is_active">
          <option value="true" selected>公開</option>
          <option value="false">非公開</option>
        </select>
      </label>
      <div class="admin-form-actions">
        <button type="submit" id="form-submit" class="admin-button-primary">登録する</button>
        <button type="button" id="cancel-create-form" class="admin-button-secondary">キャンセル</button>
      </div>
      <p id="create-error" class="admin-error" hidden></p>
    </form>
  </div>

  <div class="admin-card">
    <div class="admin-filter-row">
      <input type="search" id="product-search" placeholder="商品名・説明から検索">
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>画像</th>
            <th>商品名</th>
            <th>価格</th>
            <th>在庫</th>
            <th>公開状態</th>
            <th>編集</th>
            <th>削除</th>
          </tr>
        </thead>
        <tbody id="products-body"></tbody>
      </table>
    </div>
    <div id="products-empty" class="admin-empty-state" hidden>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>
      該当する商品がありません
    </div>
  </div>
</div>

<div id="delete-modal" class="admin-modal-overlay" hidden>
  <div class="admin-modal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="admin-modal__header">
      <h2 id="delete-modal-title">商品を削除</h2>
      <button type="button" id="delete-modal-close" class="admin-modal__close" aria-label="閉じる">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="admin-modal__body">
      <p>「<span id="delete-target-name"></span>」を削除します。この操作は取り消せません。<br>過去の注文履歴には影響しません。</p>
    </div>
    <div class="admin-modal__footer">
      <button type="button" id="delete-cancel" class="admin-button-secondary">キャンセル</button>
      <button type="button" id="delete-confirm" class="admin-button-danger">削除する</button>
    </div>
  </div>
</div>
<script src="/js/admin-products.js"></script>
</body>
</html>
