<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fff4e0"/>
  <!-- 丸ごとのみかん -->
  <circle cx="110" cy="160" r="70" fill="#f5941f"/>
  <circle cx="110" cy="160" r="70" fill="none" stroke="#e07b00" stroke-width="3"/>
  <path d="M110 90 C 100 70, 120 65, 115 50" stroke="#4c8c3a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <ellipse cx="132" cy="62" rx="16" ry="9" fill="#5da845" transform="rotate(-25 132 62)"/>
  <!-- 断面 -->
  <circle cx="280" cy="160" r="75" fill="#ffe3b0"/>
  <circle cx="280" cy="160" r="75" fill="none" stroke="#e07b00" stroke-width="4"/>
  <circle cx="280" cy="160" r="60" fill="#fff6e8" stroke="#f5c98a" stroke-width="2"/>
  <g stroke="#f5c98a" stroke-width="2">
    <line x1="280" y1="100" x2="280" y2="220"/>
    <line x1="228" y1="120" x2="332" y2="200"/>
    <line x1="228" y1="200" x2="332" y2="120"/>
    <line x1="220" y1="160" x2="340" y2="160"/>
    <line x1="240" y1="105" x2="320" y2="215"/>
    <line x1="240" y1="215" x2="320" y2="105"/>
  </g>
  <circle cx="280" cy="160" r="12" fill="#f7d9a3"/>
  <text x="200" y="270" font-family="sans-serif" font-size="18" fill="#7a4a1a" text-anchor="middle">ジューシーな果肉が自慢です</text>
</svg>
