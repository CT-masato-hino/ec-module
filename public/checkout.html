<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ご注文手続き | SAMPLE STORE</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="site-header">
  <a class="site-header__logo" href="/">SAMPLE STORE</a>
  <nav class="site-header__nav">
    <a href="/">商品一覧</a>
    <a href="/about">About</a>
  </nav>
  <a class="cart-icon" href="/cart" aria-label="カート">
    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span id="cart-badge" class="cart-icon__badge" hidden>0</span>
  </a>
</header>
<main class="checkout-page">
  <h1>ご注文手続き</h1>

  <section class="checkout-summary">
    <h2>ご注文内容</h2>
    <div id="checkout-summary-content"></div>
  </section>

  <section class="checkout-form">
    <h2>お届け先情報</h2>
    <form id="checkout-form">
      <label>お名前<span class="required">*</span>
        <input type="text" name="name" required>
      </label>
      <label>メールアドレス<span class="required">*</span>
        <input type="email" name="email" required>
      </label>
      <label>郵便番号<span class="required">*</span>
        <input type="text" name="postal_code" placeholder="123-4567" required>
      </label>
      <label>住所<span class="required">*</span>
        <input type="text" name="address" required>
      </label>
      <label>電話番号<span class="required">*</span>
        <input type="tel" name="phone" required>
      </label>
      <label>備考
        <textarea name="note" rows="3"></textarea>
      </label>
      <button type="submit" id="submit-order-button">注文する</button>
      <p id="checkout-error" class="error" hidden></p>
    </form>
  </section>
</main>
<footer class="site-footer">
  <a href="/about">About</a>
  <a href="/legal">特定商取引法に基づく表記</a>
  <p>&copy; SAMPLE STORE</p>
</footer>
<script src="/js/cart.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
